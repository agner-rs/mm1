name: Rust (fmt)

on:
  push:
    branches: [ "main", "dev", "*/dev" ]
  pull_request:
    branches: [ "*" ]
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to run the workflow on"
        required: true
        default: main

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      # Pinned nightly: rustfmt.toml uses unstable options (needs nightly), but a
      # floating @nightly drifts and breaks CI when a new nightly changes a rule.
      # Bump this date deliberately together with a `cargo fmt` pass.
      - name: Set up Rust
        uses: dtolnay/rust-toolchain@nightly-2026-06-23
        with:
          components: rustfmt

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2
        with:
          cache-all-crates: true
          cache-workspace-crates: true
          cache-on-failure: true

      - name: Run rustfmt
        run: cargo fmt --all -- --check
